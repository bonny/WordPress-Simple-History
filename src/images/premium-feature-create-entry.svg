<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 200">
  <!-- Background log list (partially visible behind form) -->
  <rect x="40" y="5" width="300" height="80" rx="6" fill="#fff" filter="drop-shadow(0 1px 2px rgba(0,0,0,0.06))"/>
  <!-- New entry indicator dot -->
  <circle cx="56" cy="22" r="5" fill="#3f9349"/>
  <rect x="68" y="18" width="120" height="7" rx="3" fill="#6b7280"/>
  <rect x="68" y="32" width="70" height="6" rx="3" fill="#d1d5db"/>
  <line x1="50" y1="46" x2="330" y2="46" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Existing row -->
  <circle cx="56" cy="58" r="5" fill="#d1d5db"/>
  <rect x="68" y="54" width="100" height="7" rx="3" fill="#d1d5db"/>
  <rect x="68" y="68" width="60" height="6" rx="3" fill="#e5e7eb"/>

  <!-- Form panel (foreground, overlapping) -->
  <rect x="80" y="55" width="310" height="138" rx="6" fill="#fff" filter="drop-shadow(0 2px 6px rgba(0,0,0,0.12))"/>
  <!-- Title label -->
  <rect x="100" y="72" width="50" height="6" rx="3" fill="#6b7280"/>
  <!-- Title input -->
  <rect x="100" y="84" width="270" height="26" rx="4" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="110" y="94" width="100" height="6" rx="3" fill="#e5e7eb"/>
  <!-- Description label -->
  <rect x="100" y="120" width="70" height="6" rx="3" fill="#6b7280"/>
  <!-- Description textarea -->
  <rect x="100" y="132" width="270" height="40" rx="4" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="110" y="143" width="200" height="5" rx="2" fill="#e5e7eb"/>
  <rect x="110" y="155" width="140" height="5" rx="2" fill="#e5e7eb"/>
  <!-- Submit button -->
  <rect x="306" y="178" width="64" height="24" rx="4" fill="#3f9349"/>
  <rect x="318" y="187" width="40" height="6" rx="3" fill="#fff"/>
</svg>
